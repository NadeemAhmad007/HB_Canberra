    <text x="0" y="80" font-family="serif" font-size="86" font-weight="300" fill="white" letter-spacing="-1">Houseboat</text>
    <text x="0" y="160" font-family="serif" font-size="86" font-weight="300" fill="#C8A86B" letter-spacing="-1">Canberra</text>
    <text x="0" y="220" font-family="serif" font-size="20" font-style="italic" fill="white" opacity="0.75">A heritage sanctuary on the still waters of Dal Lake</text>
    <line x1="0" y1="260" x2="120" y2="260" stroke="#C8A86B" stroke-width="1"/>
    <text x="0" y="295" font-family="sans-serif" font-size="14" fill="white" opacity="0.6" letter-spacing="3">S R I N A G A R &#160;·&#160; K A S H M I R</text>
